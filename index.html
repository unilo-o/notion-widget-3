<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: transparent;
            --text-color: #37352f;
            --sub-color: #a0a0a0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-color: #ffffff;
                --sub-color: #8a8a8a;
            }
        }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        .date-row {
            font-size: 14px;
            font-weight: 500;
            color: var(--sub-color);
            margin-bottom: 6px;
            letter-spacing: 0.1em;
        }
        .time-display {
            font-size: 56px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="date-row" id="date-row">LOADING...</div>
        <div class="time-display" id="time-display">--:--:--</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // 日付の取得
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const dayList = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
            const dayName = dayList[now.getDay()];
            
            // 時間の取得
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');

            // 画面への反映
            document.getElementById('date-row').innerText = `${y}/${m}/${d}  ${dayName}`;
            document.getElementById('time-display').innerText = `${hh}:${mm}:${ss}`;
        }

        // ページを読み込んだ瞬間に1回実行
        updateClock();
        
        // その後1秒（1000ミリ秒）ごとにずっと実行
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
