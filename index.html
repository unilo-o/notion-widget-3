<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: transparent;
            --text-color: #37352f;
            --bar-bg: #e9e9e8;
            --bar-fill: #37352f;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-color: #ffffff;
                --bar-bg: #3f3f3f;
                --bar-fill: #ffffff;
            }
        }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }
        .container {
            width: 90%;
            max-width: 400px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .percentage {
            font-size: 16px;
            font-weight: 700;
        }
        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: var(--bar-bg);
            border-radius: 5px;
            overflow: hidden;
        }
        #bar-fill {
            height: 100%;
            background-color: var(--bar-fill);
            width: 0%;
            transition: width 0.3s ease-out;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Today</div>
            <div class="percentage" id="percent-text">0%</div>
        </div>
        <div class="progress-bar">
            <div id="bar-fill"></div>
        </div>
    </div>
