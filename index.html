<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: transparent;
            --text-color: #37352f;
            --sub-color: #a0a0a0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-color: #ffffff;
                --sub-color: #8a8a8a;
            }
        }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        .date-row {
            font-size: 14px;
            font-weight: 500;
            color: var(--sub-color);
            margin-bottom: 4px;
            letter-spacing: 0.1em; /* 少し広げて読みやすく */
        }
        .time-display {
            font-size: 56px; /* 少し大きめに調整 */
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="date-row" id="date-row">0000/00/00 WED</div>
        <div class="time-display" id="time-display">00:00:00</div>
    </div>
