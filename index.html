<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: transparent;
            --text-color: #37352f;
            --sub-color: #a0a0a0;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-color: #ffffff;
                --sub-color: #8a8a8a;
            }
        }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        .top-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 14px;
            font-weight: 500;
            color: var(--sub-color);
            margin-bottom: 5px;
        }
        .time-display {
            font-size: 48px;
            font-weight: 700;
            font-variant-numeric: tabular-nums; /* 数字の幅を固定してガタつきを防止 */
            line-height: 1;
        }
        .seconds {
            font-size: 24px;
            margin-left: 4px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-row">
            <div id="date-text">0000/00/00</div>
            <div id="weather-text">☁️ Weather</div>
        </div>
        <div class="time-display">
            <span id="clock-text">00:00</span><span class="seconds" id="seconds-text">:00</span>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();

            // 日付の更新
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const dayList = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
            const dayName = dayList[now.getDay()];
            document.getElementById('date-text').innerText = `${y}/${m}/${d} (${dayName})`;

            // 時間の更新
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock-text').innerText = `${hh}:${mm}`;
            document.getElementById('seconds-text').innerText = `:${ss}`;
        }

        // 1秒ごとに実行
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
